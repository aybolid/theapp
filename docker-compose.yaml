services:
  db:
    env_file: ./.env
    image: postgres:18.2
    container_name: theapp_db
    restart: always
    shm_size: 128mb
    volumes:
      - ./volumes/db/data:/var/lib/postgresql
    ports:
      - 5432:5432

  garage:
    env_file: ./.env
    image: dxflrs/garage:v2.2.0
    container_name: theapp_garage
    restart: unless-stopped
    ports:
      - 3900:3900
      - 3901:3901
      - 3902:3902
      - 3903:3903
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - ./volumes/garage/meta:/tmp/meta
      - ./volumes/garage/data:/tmp/data

  # this is no longer developed. waiting on official garage web ui release
  garage_ui:
    env_file: ./.env
    image: khairul169/garage-webui:latest
    container_name: theapp_garage-ui
    restart: unless-stopped
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - 3909:3909

  # dev only
  mailpit:
    image: axllent/mailpit
    container_name: theapp_mailpit
    restart: unless-stopped
    volumes:
      - ./volumes/mailpit/data:/data
    ports:
      - 8025:8025
      - 1025:1025
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  server:
    env_file: ./.env
    build:
      dockerfile: ./apps/server/Dockerfile
    container_name: theapp_server
    restart: unless-stopped
    ports:
      - 8080:8080
    depends_on:
      - db
      - garage

  webapp:
    env_file: ./.env
    build:
      dockerfile: ./apps/webapp/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: theapp_webapp
    restart: unless-stopped
    ports:
      - 5173:80
